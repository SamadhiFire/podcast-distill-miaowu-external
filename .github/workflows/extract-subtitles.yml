name: Extract Subtitles

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "Optional URLs, one per line. Empty uses config/urls.txt."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: manual-subtitle-extraction
  cancel-in-progress: false

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system and Python dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg cmake build-essential
          pip install -r requirements.txt

      - name: Restore whisper.cpp build
        uses: actions/cache@v4
        with:
          path: whisper.cpp
          key: whisper-cpp-v1.9.1-${{ runner.os }}

      - name: Build whisper.cpp if needed
        run: |
          if [ ! -d whisper.cpp/.git ]; then
            rm -rf whisper.cpp
            git clone --depth 1 --branch v1.9.1 https://github.com/ggerganov/whisper.cpp.git whisper.cpp
          fi
          if [ ! -x whisper.cpp/build/bin/whisper-cli ]; then
            cmake -S whisper.cpp -B whisper.cpp/build -DWHISPER_BUILD_TESTS=OFF
            cmake --build whisper.cpp/build --config Release -j 4
          fi

      - name: Cache whisper.cpp model
        uses: actions/cache@v4
        id: whisper-model-cache
        with:
          path: whisper.cpp/models/ggml-small-q5_1.bin
          key: whisper-model-small-q5_1-v1

      - name: Download whisper.cpp model
        if: steps.whisper-model-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p whisper.cpp/models
          curl --fail --location --retry 3 -o whisper.cpp/models/ggml-small-q5_1.bin \
            "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-small-q5_1.bin"

      - name: Prepare optional yt-dlp cookies
        run: |
          if [ -n "${{ secrets.YTDLP_COOKIES_B64 }}" ]; then
            echo "${{ secrets.YTDLP_COOKIES_B64 }}" | base64 -d > cookies.txt
            chmod 600 cookies.txt
          fi

      - name: Prepare URLs
        env:
          INPUT_URLS: ${{ github.event.inputs.urls }}
        run: |
          if [ -n "$INPUT_URLS" ]; then
            printf '%s\n' "$INPUT_URLS" > config/urls.txt
          fi

      - name: Extract subtitles
        env:
          BILIBILI_COOKIE: ${{ secrets.BILIBILI_COOKIE }}
        run: |
          COOKIES_ARG=""
          if [ -f cookies.txt ]; then
            COOKIES_ARG="--cookies cookies.txt"
          fi
          python extract_subtitles.py \
            --batch config/urls.txt \
            --output subtitles \
            --lang zh-Hans,zh-CN,zh,en \
            --whisper-bin whisper.cpp/build/bin/whisper-cli \
            --whisper-model whisper.cpp/models/ggml-small-q5_1.bin \
            --youtube-probe-timeout 90 \
            --youtube-sleep 5 \
            --results-json subtitles/extraction_results.json \
            --retry-urls subtitles/retry_urls.txt \
            --asr-urls subtitles/asr_urls.txt \
            --allow-partial \
            $COOKIES_ARG

      - name: Upload subtitle artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: subtitle-extraction-${{ github.run_id }}
          path: subtitles/
