name: Daily Podcast Digest

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Report date, YYYY-MM-DD. Empty means today in Asia/Shanghai."
        required: false
        type: string
      dry_run_feishu:
        description: "Generate the report but do not publish to Feishu."
        required: false
        default: false
        type: boolean
  schedule:
    # 06:15 Beijing time (UTC 22:15 previous day), after the 06:00 data window closes.
    - cron: "15 22 * * *"

permissions:
  contents: read

concurrency:
  group: daily-podcast-digest
  cancel-in-progress: false

jobs:
  daily-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg cmake build-essential

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Resolve report date
        id: report_date
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            REPORT_DATE="${{ github.event.inputs.date }}"
          else
            REPORT_DATE="$(TZ=Asia/Shanghai date +'%Y-%m-%d')"
          fi
          echo "date=$REPORT_DATE" >> "$GITHUB_OUTPUT"
          echo "REPORT_DATE=$REPORT_DATE" >> "$GITHUB_ENV"
          echo "REPORT_PATH=reports/daily-${REPORT_DATE}.md" >> "$GITHUB_ENV"
          echo "ITEMS_PATH=reports/daily_items_${REPORT_DATE}.json" >> "$GITHUB_ENV"

      - name: Restore whisper.cpp build
        uses: actions/cache@v4
        with:
          path: whisper.cpp
          key: whisper-cpp-v1.9.1-${{ runner.os }}

      - name: Clone whisper.cpp
        run: |
          if [ ! -d whisper.cpp/.git ]; then
            rm -rf whisper.cpp
            git clone --depth 1 --branch v1.9.1 https://github.com/ggerganov/whisper.cpp.git whisper.cpp
          fi

      - name: Build whisper.cpp if needed
        run: |
          if [ ! -x whisper.cpp/build/bin/whisper-cli ]; then
            cmake -S whisper.cpp -B whisper.cpp/build -DWHISPER_BUILD_TESTS=OFF
            cmake --build whisper.cpp/build --config Release -j 4
          fi

      - name: Cache whisper.cpp model
        uses: actions/cache@v4
        id: whisper-model-cache
        with:
          path: whisper.cpp/models/ggml-small-q5_1.bin
          key: whisper-model-small-q5_1-v1

      - name: Download whisper.cpp model
        if: steps.whisper-model-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p whisper.cpp/models
          curl --fail --location --retry 3 -o whisper.cpp/models/ggml-small-q5_1.bin \
            "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-small-q5_1.bin"

      - name: Prepare optional yt-dlp cookies
        shell: bash
        run: |
          if [ -n "${{ secrets.YTDLP_COOKIES_B64 }}" ]; then
            echo "${{ secrets.YTDLP_COOKIES_B64 }}" | base64 -d > cookies.txt
            chmod 600 cookies.txt
            echo "yt-dlp cookies configured"
          fi

      - name: Collect daily updated items
        env:
          BILIBILI_COOKIE: ${{ secrets.BILIBILI_COOKIE }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          python scripts/collect_daily_items.py \
            --date "${REPORT_DATE}T06:00" \
            --lookback-hours 24 \
            --youtube-backend api \
            --output-json "$ITEMS_PATH" \
            --output-urls config/daily_urls.txt \
            --manifest-json "reports/daily_items_${REPORT_DATE}.manifest.json"

      - name: Extract full subtitles for daily items
        env:
          BILIBILI_COOKIE: ${{ secrets.BILIBILI_COOKIE }}
        shell: bash
        run: |
          COOKIES_ARG=""
          if [ -f cookies.txt ]; then
            COOKIES_ARG="--cookies cookies.txt"
          fi
          python extract_subtitles.py \
            --batch config/daily_urls.txt \
            --output subtitles \
            --lang zh-Hans,zh-CN,zh,en \
            --whisper-bin whisper.cpp/build/bin/whisper-cli \
            --whisper-model whisper.cpp/models/ggml-small-q5_1.bin \
            --youtube-probe-timeout 90 \
            --youtube-sleep 5 \
            --results-json subtitles/extraction_results.json \
            --retry-urls subtitles/retry_urls.txt \
            --asr-urls subtitles/asr_urls.txt \
            --allow-partial \
            $COOKIES_ARG

      - name: Retry transient subtitle failures once
        shell: bash
        run: |
          if [ ! -s subtitles/retry_urls.txt ]; then
            echo "No transient subtitle failures to retry"
            exit 0
          fi
          cp subtitles/retry_urls.txt subtitles/retry_batch.txt
          echo "Transient failures found; waiting 10 minutes before one retry"
          sleep 600
          COOKIES_ARG=""
          if [ -f cookies.txt ]; then
            COOKIES_ARG="--cookies cookies.txt"
          fi
          python extract_subtitles.py \
            --batch subtitles/retry_batch.txt \
            --output subtitles \
            --lang zh-Hans,zh-CN,zh,en \
            --whisper-bin whisper.cpp/build/bin/whisper-cli \
            --whisper-model whisper.cpp/models/ggml-small-q5_1.bin \
            --youtube-probe-timeout 90 \
            --youtube-sleep 10 \
            --results-json subtitles/retry_extraction_results.json \
            --retry-urls subtitles/retry_urls.txt \
            --asr-urls subtitles/retry_asr_urls.txt \
            --allow-partial \
            $COOKIES_ARG

      - name: Generate daily report from full transcripts
        env:
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          LLM_TIMEOUT: "600"
          LLM_CHUNK_CHARS: "30000"
        run: |
          python scripts/generate_daily_report.py \
            --date "$REPORT_DATE" \
            --items-json "$ITEMS_PATH" \
            --subtitles-dir subtitles \
            --require-transcripts \
            --output "$REPORT_PATH"

      - name: Install lark-cli
        shell: bash
        run: npm install -g @larksuite/cli@1.0.59

      - name: Publish to Feishu Wiki and notify group
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_WIKI_SPACE_ID: ${{ secrets.FEISHU_WIKI_SPACE_ID }}
          FEISHU_PARENT_NODE_TOKEN: ${{ secrets.FEISHU_PARENT_NODE_TOKEN }}
          FEISHU_NOTIFY_WEBHOOK: ${{ secrets.FEISHU_NOTIFY_WEBHOOK }}
        shell: bash
        run: |
          DRY_RUN=""
          if [ "${{ github.event.inputs.dry_run_feishu }}" = "true" ]; then
            DRY_RUN="--dry-run"
          fi
          python scripts/publish_feishu.py \
            --file "$REPORT_PATH" \
            --title "${REPORT_DATE} 播客/视频更新日报" \
            $DRY_RUN

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-digest-${{ steps.report_date.outputs.date }}
          path: |
            ${{ env.REPORT_PATH }}
            ${{ env.ITEMS_PATH }}
            reports/daily_items_${{ steps.report_date.outputs.date }}.manifest.json
            config/daily_urls.txt
            subtitles/
